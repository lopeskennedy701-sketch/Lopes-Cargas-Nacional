<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Lopes Cargas Nacional</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #0b0f19; color: #fff; overflow: hidden; }
        #layout { display: flex; width: 100%; height: 100vh; flex-direction: column; }
        #conteudo-principal { display: flex; flex: 1; position: relative; width: 100%; height: calc(100vh - 140px); }
        #map { flex: 1; height: 100%; width: 100%; z-index: 1; }
        
        .painel-status { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(15, 23, 42, 0.95); border: 1px solid #1e293b; padding: 12px; border-radius: 12px; width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); max-height: 70vh; display: flex; flex-direction: column; }
        .rastreio-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        input { padding: 8px; width: 60%; border-radius: 4px; border: none; color: #000; }
        button { padding: 8px; cursor: pointer; border-radius: 4px; border: none; background: #007bff; color: white; font-weight: bold; }
        
        #painel-logs { height: 140px; background: #090d16; border-top: 2px solid #1e293b; padding: 10px; }
        .log-lista { height: 100px; overflow-y: auto; font-family: monospace; font-size: 10px; color: #34d399; }
        
        @media (max-width: 480px) { .painel-status { width: calc(100% - 20px); } }
    </style>
</head>
<body>

    <div id="layout">
        <div id="conteudo-principal">
            <div class="painel-status">
                <h3>📡 Lopes Cargas Nacional</h3>
                <div class="rastreio-box">
                    <input type="text" id="codigoInput" placeholder="Ex: LC001 ou BR123456789BR">
                    <button onclick="rastrear()">Buscar</button>
                    <div id="resultado" style="margin-top:8px; font-size: 13px; color: #38bdf8; font-weight: bold;"></div>
                </div>
                <button style="background:#dc2626; width:100%;" onclick="alert('Alerta enviado!')">🚨 PÂNICO</button>
            </div>
            <div id="map"></div>
        </div>
        <div id="painel-logs">
            <h4>💾 Servidor de Telemetria</h4>
            <div class="log-lista" id="log-lista"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const bancoDeDados = {
            "LC001": { status: "Em trânsito", lat: -22.9068, lng: -43.1729, msg: "Rio de Janeiro/RJ" },
            "BR123456789BR": { status: "Saiu para entrega", lat: -4.2514, lng: -44.4757, msg: "Bacabal/MA" },
            "BR987654321BR": { status: "Aguardando postagem", lat: -15.7801, lng: -47.9292, msg: "Brasília/DF" }
        };

        const mapa = L.map('map').setView([-8.0, -44.0], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapa);

        let marcadorAtual = null;

        function rastrear() {
            const codigo = document.getElementById('codigoInput').value.toUpperCase().trim();
            const res = document.getElementById('resultado');
            const log = document.getElementById('log-lista');

            if (bancoDeDados[codigo]) {
                const info = bancoDeDados[codigo];
                res.innerHTML = `Status: ${info.status}<br>Local: ${info.msg}`;
                mapa.setView([info.lat, info.lng], 12);
                if (marcadorAtual) mapa.removeLayer(marcadorAtual);
                marcadorAtual = L.marker([info.lat, info.lng]).addTo(mapa).bindPopup(info.status).openPopup();
                log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${codigo}: Localizado</div>`;
            } else if (codigo.startsWith("BR") && codigo.length > 10) {
                res.innerText = "Em processamento logístico.";
                log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${codigo}: Em trânsito postal</div>`;
            } else {
                res.innerText = "Código não encontrado.";
            }
        }
    </script>
</body>
</html>
