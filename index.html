<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Lopes Cargas Nacional</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #0b0f19; color: #fff; overflow: hidden; }
        #layout { display: flex; width: 100%; height: 100vh; flex-direction: column; }
        #conteudo-principal { display: flex; flex: 1; position: relative; width: 100%; height: calc(100vh - 170px); }
        #map { flex: 1; height: 100%; width: 100%; z-index: 1; }
        
        .painel-status { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(15, 23, 42, 0.95); border: 1px solid #1e293b; padding: 12px; border-radius: 12px; width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); max-height: 80vh; overflow-y: auto; }
        .rastreio-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        input { padding: 8px; width: 60%; border-radius: 4px; border: none; color: #000; }
        button { padding: 8px; cursor: pointer; border-radius: 4px; border: none; background: #007bff; color: white; font-weight: bold; }
        
        .caminhao-icon { font-size: 28px; text-shadow: 0 0 5px black; }
        .timeline { border-left: 2px solid #334155; margin-left: 10px; padding-left: 20px; margin-top: 15px; }
        .timeline-item { margin-bottom: 15px; position: relative; font-size: 12px; }
        .timeline-item::before { content: ''; position: absolute; left: -27px; top: 0; width: 12px; height: 12px; background: #38bdf8; border-radius: 50%; }
        
        #btnRastreioReal { display: none; margin-top: 10px; background: #28a745; padding: 8px; text-decoration: none; color: white; border-radius: 4px; text-align: center; font-weight: bold; font-size: 13px; }
        #empresa-display { font-size: 14px; color: #f59e0b; margin-bottom: 8px; font-weight: bold; }
        
        #painel-logs { height: 110px; background: #090d16; border-top: 2px solid #1e293b; padding: 10px; }
        .log-lista { height: 70px; overflow-y: auto; font-family: monospace; font-size: 10px; color: #34d399; }
        
        .ticker-wrap { width: 100%; background: #000; color: #38bdf8; overflow: hidden; white-space: nowrap; padding: 8px; font-size: 12px; border-top: 1px solid #333; font-weight: bold; }
        .ticker { display: inline-block; animation: marquee 25s linear infinite; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        
        @media (max-width: 480px) { .painel-status { width: calc(100% - 20px); } }
    </style>
</head>
<body>

    <div id="layout">
        <div id="conteudo-principal">
            <div class="painel-status">
                <h3>📡 Lopes Cargas Nacional</h3>
                <div class="rastreio-box">
                    <input type="text" id="codigoInput" placeholder="Ex: BR2646431958792">
                    <button onclick="rastrear()">Buscar</button>
                </div>
                
                <div id="resultado-container" style="display:none;">
                    <div id="empresa-display"></div>
                    <div id="status-display" style="margin-bottom:5px; font-weight:bold; color:#38bdf8;"></div>
                    <div id="timeline" class="timeline"></div>
                    <a id="btnRastreioReal" href="#" target="_blank">Rastrear em Rede Global</a>
                </div>
                <button style="background:#dc2626; width:100%; margin-top:15px;" onclick="alert('Alerta de segurança enviado!')">🚨 PÂNICO</button>
            </div>
            <div id="map"></div>
        </div>
        <div id="painel-logs">
            <h4>💾 Servidor de Telemetria</h4>
            <div class="log-lista" id="log-lista"></div>
        </div>
        <div class="ticker-wrap">
            <div class="ticker">
                LOPES CARGAS NACIONAL — PARCERIAS: SHOPEE XPRESS, CORREIOS, JADLOG, AZUL CARGO — MONITORAMENTO VIA SATÉLITE EM TEMPO REAL — STATUS: OPERACIONAL 🚚
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Adicione novas empresas aqui mudando o campo 'transportadora'
        const bancoDeDados = {
            "BR2646431958792": {
                transportadora: "Shopee Xpress",
                status: "Em trânsito para São Luís - MA",
                posicaoAtual: [-16.6869, -49.2648], 
                trajeto: [[-25.4284, -49.2733], [-16.6869, -49.2648], [-2.5307, -44.3068]], 
                eventos: [
                    { data: "10 Jul 2026 - 17:47", msg: "Em trânsito para: São Luís - MA" },
                    { data: "09 Jul 2026 - 16:36", msg: "Recebido no centro de triagem: Goiânia - GO" },
                    { data: "08 Jul 2026 - 01:44", msg: "Recebido no centro de triagem: Curitiba - PR" }
                ]
            }
        };

        const mapa = L.map('map').setView([-12.0, -48.0], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapa);

        const caminhaoIcon = L.divIcon({ html: '<div class="caminhao-icon">🚚</div>', className: 'custom-div-icon', iconSize: [30, 30] });
        let marcadorCaminhao = null;
        let linhaTrajeto = null;

        function rastrear() {
            const codigo = document.getElementById('codigoInput').value.toUpperCase().trim();
            const container = document.getElementById('resultado-container');
            const timeline = document.getElementById('timeline');
            const statusDisplay = document.getElementById('status-display');
            const empresaDisplay = document.getElementById('empresa-display');
            const btn = document.getElementById('btnRastreioReal');
            const log = document.getElementById('log-lista');

            if (bancoDeDados[codigo]) {
                new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3').play();
                
                const info = bancoDeDados[codigo];
                container.style.display = "block";
                btn.style.display = "none";
                
                empresaDisplay.innerText = "Transportadora: " + info.transportadora;
                statusDisplay.innerText = "Status: " + info.status;
                
                timeline.innerHTML = info.eventos.map(e => `
                    <div class="timeline-item">
                        <div style="color:#aaa; font-size:10px;">${e.data}</div>
                        <div>${e.msg}</div>
                    </div>
                `).join('');

                if (marcadorCaminhao) mapa.removeLayer(marcadorCaminhao);
                if (linhaTrajeto) mapa.removeLayer(linhaTrajeto);

                linhaTrajeto = L.polyline(info.trajeto, {color: '#f59e0b', weight: 4, dashArray: '10, 10'}).addTo(mapa);
                marcadorCaminhao = L.marker(info.posicaoAtual, {icon: caminhaoIcon}).addTo(mapa).bindPopup("<b>Lopes Cargo:</b> " + info.status).openPopup();
                
                mapa.fitBounds(info.trajeto);
                log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${codigo}: Rota carregada (${info.transportadora}).</div>`;
            } else if (codigo.length > 5) {
                container.style.display = "block";
                empresaDisplay.innerText = "Empresa: Não identificada";
                statusDisplay.innerText = "Buscando rede global...";
                timeline.innerHTML = "";
                btn.href = `https://www.17track.net/pt/track?nums=${codigo}`;
                btn.style.display = "block";
                log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${codigo}: Redirecionado para rede externa.</div>`;
            } else {
                alert("Por favor, digite um código válido.");
            }
        }
    </script>
</body>
</html>
