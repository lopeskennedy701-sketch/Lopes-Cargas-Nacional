<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Master Central National - Mobile & Desktop</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #0b0f19; color: #fff; overflow: hidden; }
        
        #layout { display: flex; width: 100%; height: 100vh; flex-direction: column; }
        #conteudo-principal { display: flex; flex: 1; position: relative; width: 100%; height: calc(100vh - 140px); }
        #map { flex: 1; height: 100%; width: 100%; z-index: 1; }
        
        /* Painel Adaptável para Telemóvel e PC */
        .painel-status {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(15, 23, 42, 0.95); border: 1px solid #1e293b;
            padding: 12px; border-radius: 12px; width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-height: 55vh; display: flex; flex-direction: column;
        }
        h3 { color: #38bdf8; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        
        .container-cards { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; padding-right: 4px; }
        .card-caminhao { background: rgba(255,255,255,0.02); padding: 8px; border-radius: 8px; border: 1px solid #334155; }
        .card-caminhao.ativo { border-color: #22c55e; background: rgba(34, 197, 94, 0.03); }
        .nome-frota { font-weight: bold; color: #f8fafc; font-size: 12px; margin-bottom: 4px; display: flex; justify-content: space-between;}
        
        .dados-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; font-size: 11px; color: #94a3b8; }
        .destaque { color: #cbd5e1; font-weight: 600; }
        
        .status-box { padding: 4px; border-radius: 4px; text-align: center; font-weight: bold; margin-top: 6px; font-size: 10px; text-transform: uppercase; }
        .alerta-seguranca { color: #38bdf8; background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.2); }
        .sucesso-seguranca { color: #22c55e; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); }
        .perigo-critico { color: #fff; background: #dc2626; animation: piscar 0.5s infinite alternate; }
        
        /* Ícones no Mapa */
        .marcador-caminhao-custom {
            display: flex; justify-content: center; align-items: center;
            background: #0f172a; border: 2px solid;
            border-radius: 50%; width: 32px !important; height: 32px !important;
        }
        .marcador-caminhao-custom i { font-size: 14px; }

        .botoes-comando { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
        .btn { padding: 8px; border: none; border-radius: 6px; font-weight: bold; font-size: 10px; cursor: pointer; color: white; text-transform: uppercase; }
        .btn-panico { background: #dc2626; border: 1px solid #ef4444; }
        .btn-bloqueio { background: #d97706; border: 1px solid #f59e0b; }
        
        /* Terminal de Logs Reduzido para ecrãs pequenos */
        #painel-logs { height: 140px; background: #090d16; border-top: 2px solid #1e293b; padding: 10px; display: flex; flex-direction: column; }
        h4 { color: #64748b; font-size: 10px; text-transform: uppercase; margin-bottom: 4px; }
        .log-lista { flex: 1; overflow-y: auto; font-family: 'Courier New', Courier, monospace; font-size: 10px; color: #34d399; display: flex; flex-direction: column; gap: 2px; }
        .log-item { display: flex; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.02); padding-bottom: 2px; }
        .log-time { color: #64748b; }
        
        /* Ajustes específicos para ecrãs de Telemóvel bem pequenos */
        @media (max-width: 480px) {
            .painel-status { width: calc(100% - 20px); max-height: 45vh; top: 10px; left: 10px; }
            h3 { font-size: 12px; }
            #painel-logs { height: 120px; }
        }

        @keyframes piscar {
            from { background: #dc2626; box-shadow: 0 0 4px #dc2626; }
            to { background: #7f1d1d; box-shadow: 0 0 12px #dc2626; }
        }
    </style>
</head>
<body>

    <div id="layout">
        <div id="conteudo-principal">
            
            <div class="painel-status">
                <h3>📡 Monitoramento em Tempo Real</h3>
                <p style="font-size: 10px; color: #64748b; margin-bottom: 6px;">Destino: CD Bacabal (MA) - Toque para Ativar Som</p>
                
                <div class="container-cards" id="container-cards">
                    </div>
                
                <div class="botoes-comando">
                    <button class="btn btn-panico" onclick="dispararPanicoGral()">🚨 Pânico</button>
                    <button class="btn btn-bloqueio" onclick="alternarBloqueioGral()" id="btn-bloqueio">🛑 Bloquear</button>
                </div>
            </div>

            <div id="map"></div>
        </div>

        <div id="painel-logs">
            <h4>💾 Servidor de Telemetria Remota</h4>
            <div class="log-lista" id="log-lista">
                <div class="log-item"><span class="log-time">[SISTEMA]</span> Central de rastreamento online. Toque na tela para ativar alertas sonoros.</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // --- MOTOR DE ÁUDIO RESTRITO PARA MOBILE ---
        let audioCtx = null;
        
        // Ativa o contexto de áudio no primeiro clique/toque do utilizador (obrigatório em telemóveis)
        function iniciarAudioMobile() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                gerarLog("ÁUDIO", "Módulo de som sincronizado com o telemóvel.");
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        window.addEventListener('click', iniciarAudioMobile);
        window.addEventListener('touchstart', iniciarAudioMobile);

        function tocarBipe(frequencia, duracao, tipo = 'sine') {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = tipo;
                osc.frequency.setValueAtTime(frequencia, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duracao);
            } catch(e) {}
        }

        let somSirene = null;
        function iniciarSirene() {
            if (somSirene || !audioCtx) return;
            try {
                somSirene = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                somSirene.type = 'sawtooth';
                somSirene.frequency.setValueAtTime(440, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                somSirene.connect(gain);
                gain.connect(audioCtx.destination);
                somSirene.start();
                
                let subindo = true;
                setInterval(() => {
                    if (!somSirene) return;
                    let freq = somSirene.frequency.value;
                    if (subindo) { freq += 30; if(freq >= 750) subindo = false; }
                    else { freq -= 30; if(freq <= 350) subindo = true; }
                    somSirene.frequency.setValueAtTime(freq, audioCtx.currentTime);
                }, 25);
            } catch(e) {}
        }

        const destinoLat = -4.2261;
        const destinoLng = -44.7812;

        let frotas = {
            t1: { nome: "Volvo FH 540", placa: "LPG-2026", origem: "Goiânia (GO)", lat: -16.6869, lng: -49.2648, vel: 85, cor: "#00f2ff", marker: null, rastro: null, entrou: false, taxa: 0.08 },
            t2: { nome: "Scania R 540", placa: "SLS-1920", origem: "São Luís (MA)", lat: -2.5391, lng: -44.2829, vel: 80, cor: "#a855f7", marker: null, rastro: null, entrou: false, taxa: 0.15 },
            t3: { nome: "Mercedes Actros", placa: "BAH-4412", origem: "Salvador (BA)", lat: -12.9714, lng: -38.5014, vel: 78, cor: "#eab308", marker: null, rastro: null, entrou: false, taxa: 0.07 },
            t4: { nome: "DAF XF 530", placa: "RJO-7721", origem: "Rio de Janeiro (RJ)", lat: -22.9068, lng: -43.1729, vel: 82, cor: "#ec4899", marker: null, rastro: null, entrou: false, taxa: 0.05 },
            t5: { nome: "Iveco Hi-Way", placa: "BEL-3099", origem: "Belém (PA)", lat: -1.4558, lng: -48.4902, vel: 80, cor: "#22c55e", marker: null, rastro: null, entrou: false, taxa: 0.11 }
        };

        let emPanico = false;
        let frotaBloqueada = false;

        // Inicializa o mapa focado nas frotas do Brasil
        const mapa = L.map('map', { tap: false }).setView([-8.0, -44.0], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© CARTO'
        }).addTo(mapa);

        L.circle([destinoLat, destinoLng], {
            color: '#ef4444', fillColor: '#ef4444', fillOpacity: 0.03, radius: 3500, weight: 1.5, dashArray: '5, 5'
        }).addTo(mapa);

        const iconeCD = L.divIcon({
            html: '<div style="font-size: 22px;">🏢</div>',
            className: 'ic-cd', iconAnchor: [11, 11]
        });
        L.marker([destinoLat, destinoLng], { icon: iconeCD }).addTo(mapa).bindPopup("<b>CD Bacabal</b>");

        function construirPainel() {
            const container = document.getElementById('container-cards');
            container.innerHTML = '';
            for (let id in frotas) {
                let f = frotas[id];
                container.innerHTML += `
                    <div class="card-caminhao" id="card-${id}">
                        <div class="nome-frota"><span>🚚 ${id.toUpperCase()}</span> <span id="${id}-vel" style="color:#38bdf8">${f.vel} km/h</span></div>
                        <div class="dados-grid">
                            <div>Placa: ${f.placa}</div>
                            <div>Origem: ${f.origem}</div>
                            <div id="${id}-dist" style="grid-column: span 2;">Calculando...</div>
                        </div>
                        <div id="${id}-status" class="status-box alerta-seguranca">🛣️ Em Rota</div>
                    </div>
                `;
            }
        }
        construirPainel();

        function gerarLog(tipo, msg) {
            const lista = document.getElementById('log-lista');
            const tempo = new Date().toTimeString().split(' ')[0];
            const novo = document.createElement('div');
            novo.className = 'log-item';
            novo.innerHTML = `<span class="log-time">[${tempo}] [${tipo}]</span> <span>${msg}</span>`;
            lista.appendChild(novo);
            lista.scrollTop = lista.scrollHeight;
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function dispararPanicoGral() {
            iniciarAudioMobile();
            emPanico = true;
            iniciarSirene();
            document.querySelectorAll('.status-box').forEach(el => {
                el.innerText = "🚨 GEOFENCE CRÍTICO"; el.className = "status-box perigo-critico";
            });
            for(let id in frotas) { document.getElementById(`${id}-vel`).innerText = "0 km/h"; }
            gerarLog("CRÍTICO", "Alerta geral ativado!");
        }

        function alternarBloqueioGral() {
            iniciarAudioMobile();
            if (emPanico) return;
            frotaBloqueada = !frotaBloqueada;
            const btn = document.getElementById('btn-bloqueio');
            if (frotaBloqueada) {
                btn.innerText = "Liberar"; btn.style.background = "#22c55e";
                for(let id in frotas) { document.getElementById(`${id}-vel`).innerText = "0 km/h"; }
                tocarBipe(320, 0.4, 'square');
                gerarLog("COMANDO", "Bloqueio preventivo satelital acionado.");
            } else {
                btn.innerText = "Bloquear"; btn.style.background = "#d97706";
                tocarBipe(580, 0.2, 'sine');
                gerarLog("COMANDO", "Motores desbloqueados.");
            }
        }

        const loopNacional = setInterval(() => {
            if (emPanico || frotaBloqueada) return;

            let frotasFinalizadas = 0;
            let totalFrotas = Object.keys(frotas).length;

            for (let id in frotas) {
                let f = frotas[id];
                let dist = calcularDistancia(f.lat, f.lng, destinoLat, destinoLng);
                
                document.getElementById(`${id}-dist`).innerHTML = `Dist: ${dist.toFixed(1)} km`;

                if (dist <= 0.15) {
                    document.getElementById(`${id}-vel`).innerText = "0 km/h";
                    document.getElementById(`${id}-status`).innerText = "🏁 No Pátio";
                    document.getElementById(`${id}-status`).className = "status-box sucesso-seguranca";
                    frotasFinalizadas++;
                    continue;
                }

                if (dist > 3.5) {
                    f.lat += (destinoLat - f.lat) * f.taxa;
                    f.lng += (destinoLng - f.lng) * f.taxa;
                    document.getElementById(`${id}-vel`).innerText = `${f.vel} km/h`;
                } else {
                    if (!f.entrou) {
                        f.entrou = true;
                        document.getElementById(`card-${id}`).classList.add('ativo');
                        tocarBipe(950, 0.1, 'sine');
                        setTimeout(() => tocarBipe(950, 0.1, 'sine'), 120);
                        gerarLog("SINAL", `${id.toUpperCase()} entrou no perímetro urbano.`);
                    }
                    document.getElementById(`${id}-vel`).innerText = "30 km/h";
                    document.getElementById(`${id}-status`).innerText = "🔓 Zona Final";
                    document.getElementById(`${id}-status`).className = "status-box sucesso-seguranca";

                    f.lat += (destinoLat - f.lat) * 0.20;
                    f.lng += (destinoLng - f.lng) * 0.20;
                }

                if (!f.rastro) {
                    f.rastro = L.polyline([], { color: f.cor, weight: 2.5, opacity: 0.7 }).addTo(mapa);
                }
                f.rastro.addLatLng([f.lat, f.lng]);

                if (!f.marker) {
                    const iconeCamVetorial = L.divIcon({
                        html: `<i class="fa-solid fa-truck" style="color: ${f.cor};"></i>`,
                        className: 'marcador-caminhao-custom',
                        style: `border-color: ${f.cor}; box-shadow: 0 0 5px ${f.cor};`,
                        iconSize: [32, 32], iconAnchor: [16, 16]
                    });
                    f.marker = L.marker([f.lat, f.lng], { icon: iconeCamVetorial }).addTo(mapa);
                } else {
                    f.marker.setLatLng([f.lat, f.lng]);
                }
            }

            if (frotasFinalizadas === totalFrotas) {
                gerarLog("SUCESSO", "Frota 100% recebida.");
                clearInterval(loopNacional);
            }

        }, 1200);
    </script>
</body>
</html>
