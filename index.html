<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Lopes Cargas Nacional</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #0b0f19; color: #fff; overflow: hidden; }
        #layout { display: flex; width: 100%; height: 100vh; flex-direction: column; }
        #conteudo-principal { display: flex; flex: 1; position: relative; width: 100%; height: calc(100vh - 140px); }
        #map { flex: 1; height: 100%; width: 100%; z-index: 1; }
        
        .painel-status { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(15, 23, 42, 0.95); border: 1px solid #1e293b; padding: 12px; border-radius: 12px; width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); max-height: 70vh; display: flex; flex-direction: column; }
        
        /* Estilo do Rastreamento */
        .rastreio-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        input { padding: 8px; width: 60%; border-radius: 4px; border: none; }
        button { padding: 8px; cursor: pointer; border-radius: 4px; border: none; background: #007bff; color: white; }
        
        .container-cards { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; }
        .card-caminhao { background: rgba(255,255,255,0.02); padding: 8px; border-radius: 8px; border: 1px solid #334155; }
        
        #painel-logs { height: 140px; background: #090d16; border-top: 2px solid #1e293b; padding: 10px; }
        .log-lista { height: 100px; overflow-y: auto; font-family: monospace; font-size: 10px; color: #34d399; }
        
        @media (max-width: 480px) { .painel-status { width: calc(100% - 20px); } }
    </style>
</head>
<body>

    <div id="layout">
        <div id="conteudo-principal">
            <div class="painel-status">
                <h3>📡 Lopes Cargas Nacional</h3>
                
                <div class="rastreio-box">
                    <input type="text" id="codigoInput" placeholder="Código (Ex: LC001)">
                    <button onclick="rastrear()">Buscar</button>
                    <div id="resultado" style="margin-top:8px; font-size: 12px; color: #38bdf8;"></div>
                </div>

                <div class="container-cards" id="container-cards"></div>
                <div class="botoes-comando">
                    <button class="btn" style="background:#dc2626; width:100%;" onclick="dispararPanicoGral()">🚨 PÂNICO</button>
                </div>
            </div>
            <div id="map"></div>
        </div>

        <div id="painel-logs">
            <h4>💾 Servidor de Telemetria</h4>
            <div class="log-lista" id="log-lista"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- BANCO DE DADOS DE RASTREIO ---
        const bancoDeDados = {
            "LC001": "Status: Em trânsito - Localização: Rio de Janeiro/RJ",
            "LC002": "Status: Saiu para entrega - Localização: Bacabal/MA",
            "LC003": "Status: Entregue - Recebido por: Destinatário"
        };

        function rastrear() {
            const codigo = document.getElementById('codigoInput').value.toUpperCase().trim();
            const res = document.getElementById('resultado');
            res.innerText = bancoDeDados[codigo] ? bancoDeDados[codigo] : "Código não encontrado.";
        }

        // --- MOTOR DO MAPA E FROTA (Mantido o seu código original abaixo) ---
        // (O seu código de mapa e lógica de frota entra aqui)
        // ...
        
        // Exemplo de log básico
        function gerarLog(tipo, msg) {
            const lista = document.getElementById('log-lista');
            lista.innerHTML += `<div>[${tipo}] ${msg}</div>`;
        }
        
        const mapa = L.map('map').setView([-8.0, -44.0], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapa);
    </script>
</body>
</html>
