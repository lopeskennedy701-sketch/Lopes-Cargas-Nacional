<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Lopes Cargas Nacional</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #0b0f19; color: #fff; overflow: hidden; }
        #layout { display: flex; width: 100%; height: 100vh; flex-direction: column; }
        #conteudo-principal { display: flex; flex: 1; position: relative; width: 100%; height: calc(100vh - 140px); }
        #map { flex: 1; height: 100%; width: 100%; z-index: 1; }
        
        .painel-status { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(15, 23, 42, 0.95); border: 1px solid #1e293b; padding: 12px; border-radius: 12px; width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); max-height: 80vh; overflow-y: auto; }
        .rastreio-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        input { padding: 8px; width: 60%; border-radius: 4px; border: none; color: #000; }
        button { padding: 8px; cursor: pointer; border-radius: 4px; border: none; background: #007bff; color: white; font-weight: bold; }
        
        /* Timeline */
        .timeline { border-left: 2px solid #334155; margin-left: 10px; padding-left: 20px; margin-top: 15px; }
        .timeline-item { margin-bottom: 15px; position: relative; font-size: 12px; }
        .timeline-item::before { content: ''; position: absolute; left: -27px; top: 0; width: 12px; height: 12px; background: #38bdf8; border-radius: 50%; }
        
        #btnRastreioReal { display: none; margin-top: 10px; background: #28a745; padding: 8px; text-decoration: none; color: white; border-radius: 4px; text-align: center; font-weight: bold; font-size: 13px; }
        #painel-logs { height: 140px; background: #090d16; border-top: 2px solid #1e293b; padding: 10px; }
        .log-lista { height: 100px; overflow-y: auto; font-family: monospace; font-size: 10px; color: #34d399; }
        
        @media (max-width: 480px) { .painel-status { width: calc(100% - 20px); } }
    </style>
</head>
<body>

    <div id="layout">
        <div id="conteudo-principal">
            <div class="painel-status">
                <h3>📡 Lopes Cargas Nacional</h3>
                <div class="rastreio-box">
                    <input type="text" id="codigoInput" placeholder="Ex: BR2646431958792">
                    <button onclick="rastrear()">Buscar</button>
                </div>
                
                <div id="resultado-container" style="display:none;">
                    <div id="status-display" style="margin-bottom:5px; font-weight:bold; color:#38bdf8;"></div>
                    <div id="timeline" class="timeline"></div>
                    <a id="btnRastreioReal" href="#" target="_blank">Rastrear em Rede Global</a>
                </div>
                <button style="background:#dc2626; width:100%; margin-top:15px;" onclick="alert('Alerta enviado!')">🚨 PÂNICO</button>
            </div>
            <div id="map"></div>
        </div>
        <div id="painel-logs">
            <h4>💾 Servidor de Telemetria</h4>
            <div class="log-lista" id="log-lista"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const bancoDeDados = {
            "BR2646431958792": {
                status: "Em trânsito",
                lat: -16.6869, lng: -49.2648,
                eventos: [
                    { data: "10 Jul 2026 - 14:47", msg: "Seu pedido saiu do centro logístico: Goiânia - GO" },
                    { data: "10 Jul 2026 - 01:33", msg: "Seu pedido está em separação no centro logístico: Goiânia - GO" },
                    { data: "09 Jul 2026 - 13:36", msg: "Seu pedido chegou ao centro logístico: Goiânia - GO" },
                    { data: "08 Jul 2026 - 08:49", msg: "Seu pedido saiu do centro logístico: Campina Grande do Sul - PR" }
                ]
            }
        };

        const mapa = L.map('map').setView([-15.0, -50.0], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapa);

        let marcadorAtual = null;

        function rastrear() {
            const codigo = document.getElementById('codigoInput').value.toUpperCase().trim();
            const container = document.getElementById('resultado-container');
            const timeline = document.getElementById('timeline');
            const statusDisplay = document.getElementById('status-display');
            const btn = document.getElementById('btnRastreioReal');
            const log = document.getElementById('log-lista');

            if (bancoDeDados[codigo]) {
                const info = bancoDeDados[codigo];
                container.style.display = "block";
                btn.style.display = "none";
                statusDisplay.innerText = "Status: " + info.status;
                
                timeline.innerHTML = info.eventos.map(e => `
                    <div class="timeline-item">
                        <div style="color:#aaa; font-size:10px;">${e.data}</div>
                        <div>${e.msg}</div>
                    </div>
                `).join('');

                mapa.setView([info.lat, info.lng], 12);
                if (marcadorAtual) mapa.removeLayer(marcadorAtual);
                marcadorAtual = L.marker([info.lat, info.lng]).addTo(mapa).bindPopup(info.status).openPopup();
                
                log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${codigo}: Localizado internamente</div>`;
            } else if (codigo.length > 5) {
                container.style.display = "block";
                statusDisplay.innerText = "Rastreando encomenda...";
                timeline.innerHTML = "";
                // Redireciona para o 17Track, que é o padrão mundial para qualquer transportadora
                btn.href = `https://www.17track.net/pt/track?nums=${codigo}`;
                btn.style.display = "block";
                log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${codigo}: Redirecionado p/ Rede Global</div>`;
            } else {
                alert("Por favor, digite um código válido.");
            }
        }
    </script>
</body>
</html>
