<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lopes Cargas | Acesso</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0b0f19; color: #fff; }

        /* Estilo da tela de login */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 2000; background: #0b0f19; }
        .login-box { background: #1e293b; padding: 30px; border-radius: 15px; width: 320px; text-align: center; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: 1px solid #475569; background: #0b0f19; color: #fff; }
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; background: #38bdf8; font-weight: bold; cursor: pointer; }

        /* Estilo do mapa (escondido inicialmente) */
        #main-app { display: none; width: 100%; height: 100vh; }
        #map { width: 100%; height: 100%; }
        .painel-status { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(15, 23, 42, 0.95); padding: 15px; border-radius: 12px; width: 300px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Lopes Cargas</h2>
            <p style="font-size: 12px; color: #94a3b8; margin-top:5px;">Acompanhe sua carga em tempo real</p>
            <input type="text" id="codigoInput" placeholder="Código de Rastreio ou Admin">
            <button onclick="fazerLogin()">Acessar Monitoramento</button>
        </div>
    </div>

    <div id="main-app">
        <div class="painel-status">
            <h3 id="titulo-painel">📡 Rastreamento</h3>
            <div id="info-carga"></div>
            <button onclick="location.reload()" style="background:#dc2626; color:white; margin-top:10px;">Sair</button>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function fazerLogin() {
            const codigo = document.getElementById('codigoInput').value.trim().toUpperCase();
            
            // Simulação de acesso
            if (codigo === "BR2646431958792" || codigo === "ADMIN123") {
                // Esconde login e mostra o app
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                
                // Inicia o mapa (necessário recarregar para o Leaflet renderizar)
                setTimeout(() => {
                    const map = L.map('map').setView([-16.68, -49.26], 6);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                    L.marker([-16.68, -49.26]).addTo(map).bindPopup("Carga em Trânsito").openPopup();
                }, 100);
            } else {
                alert("Código inválido!");
            }
        }
    </script>
</body>
</html>
